version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-myapp_dev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  bff:
    build:
      context: .
      dockerfile: Dockerfile.bff
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-myapp_dev}?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}
    ports:
      - '${BFF_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  fe:
    build:
      context: .
      dockerfile: Dockerfile.fe
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    environment:
      # Points nginx's /api proxy to the bff service inside the compose network
      BFF_INTERNAL_URL: http://bff:3000
    ports:
      - '${FE_PORT:-8080}:80'
    depends_on:
      bff:
        condition: service_started
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
