alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
ingress:
  rules:
    - component:
        name: pep
      match:
        path:
          prefix: /
name: seahorse-app
region: nyc
services:
  - dockerfile_path: Dockerfile.bff
    github:
      branch: other
      deploy_on_push: true
      repo: pljoe111/pep
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb-fixed
    name: pep
    source_dir: /
    health_check:
      http_path: /api/app-info
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
