name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: myapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm 10
        uses: pnpm/action-setup@v3
        with:
          version: '10'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://postgres:password@localhost:5432/myapp_test?schema=public
          CORS_ORIGIN: http://localhost:5173
          ENABLE_SWAGGER: 'true'
          PORT: '3000'
          HOST: '0.0.0.0'
          VITE_API_URL: http://localhost:3000/api
        run: pnpm build

      - name: Run BFF tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/myapp_test?schema=public
          CORS_ORIGIN: http://localhost:5173
          ENABLE_SWAGGER: 'false'
          PORT: '3000'
          HOST: '0.0.0.0'
        run: pnpm test:bff

      # ── Release (push only, not on PRs) ──────────────────────────────────
      - name: Create release artifact
        if: github.event_name == 'push'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          zip -r "release-${SHORT_SHA}.zip" \
            packages/bff/dist \
            packages/fe/dist \
            packages/common/dist \
            packages/api-client/dist \
            --exclude "*/node_modules/*"

      - name: Tag and release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="build-${SHORT_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"
          gh release create "${TAG}" \
            release-*.zip \
            --title "Build ${SHORT_SHA}" \
            --notes "Automated build from commit ${{ github.sha }} on branch ${{ github.ref_name }}" \
            ${{ github.ref_name != 'main' && '--prerelease' || '' }}
