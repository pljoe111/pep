server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1024;

    # Health check endpoint (no proxy — fast local response)
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Reverse-proxy all /api/* requests to the BFF service.
    #
    # In DigitalOcean App Platform, services reach each other via their service
    # name on port 8080 (the platform's internal load-balancer port).
    # The BFF_INTERNAL_URL env var is injected by the app.yaml spec so this
    # config stays the same for both docker-compose (http://bff:3000) and DO.
    #
    # Fallback: if BFF_INTERNAL_URL is not set, default to docker-compose name.
    location /api/ {
        proxy_pass        ${BFF_INTERNAL_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  Upgrade           $http_upgrade;
        proxy_set_header  Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA routing — send all non-asset routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
